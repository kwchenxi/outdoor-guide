<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>地图测试 - 粤晋山海 户外向导</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      #map {
        width: 100%;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      // 等待 Leaflet 加载
      function initMap() {
        if (typeof L === 'undefined') {
          console.error('Leaflet not loaded yet');
          setTimeout(initMap, 100);
          return;
        }

        console.log('Initializing map...');
        
        try {
          const map = L.map('map').setView([30.0, 102.0], 12);
          
          // 使用 OpenStreetMap 替代 OpenTopoMap 测试
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
          }).addTo(map);

          // 添加一个测试标记
          const marker = L.marker([30.0, 102.0]).addTo(map);
          marker.bindPopup('测试标记').openPopup();

          console.log('Map initialized successfully!');
        } catch (error) {
          console.error('Map initialization error:', error);
          document.getElementById('map').innerHTML = `
            <div style="padding: 20px; text-align: center;">
              <h2 style="color: red;">地图初始化失败</h2>
              <p>错误: ${error.message}</p>
            </div>
          `;
        }
      }

      // 页面加载完成后初始化地图
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initMap);
      } else {
        initMap();
      }
    </script>
  </body>
</html>
